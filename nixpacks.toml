[phases.setup]
nixPkgs = ["python310", "nodejs"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd backend && python3 -m pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
